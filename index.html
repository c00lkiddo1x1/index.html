var auth=firebase.auth(),db=firebase.firestore();
var currentUser=null,currentProfile=null;

// ── TAGS ─────────────────────────────────────────────────
var SPECIAL_TAGS={
    'nico':    ['[Dev]','[Verified]'],
    'cat':     ['[Dev]','[Verified]','[OG-Media]'],
    '44devs':  ['[Dev]','[Verified]'],
    'milan':   ['[IDev]']
};
var OG_START=new Date('2025-03-20T00:00:00Z').getTime();
var OG_END=new Date('2025-04-02T00:00:00Z').getTime();

// One-time admin function - call adminSeedTags() from browser console while logged in as nico/44devs
window.adminSeedTags = async function(){
    var adminUsers=['nico','44devs'];
    if(!currentProfile||adminUsers.indexOf(currentProfile.username)===-1){console.log('Not an admin');return;}
    console.log('Seeding tags for all special users...');
    var targets=Object.keys(SPECIAL_TAGS);
    for(var i=0;i<targets.length;i++){
        var uname=targets[i];
        var udoc=await db.collection('usernames').doc(uname).get();
        if(!udoc.exists){console.log(uname+' not registered yet, skipping');continue;}
        var uid=udoc.data().uid;
        var userDoc=await db.collection('users').doc(uid).get();
        if(!userDoc.exists)continue;
        var data=userDoc.data();
        var tags=data.tags||[];
        var special=SPECIAL_TAGS[uname]||[];
        special.forEach(function(t){if(tags.indexOf(t)===-1)tags.push(t);});
        // OG: check createdAt
        if(data.createdAt){
            var ct=data.createdAt.toDate?data.createdAt.toDate().getTime():new Date(data.createdAt).getTime();
            if(ct>=OG_START&&ct<OG_END&&tags.indexOf('[OG]')===-1)tags.push('[OG]');
        }
        await db.collection('users').doc(uid).update({tags:tags});
        console.log('Tagged '+uname+': '+tags.join(', '));
    }
    // Also OG-tag ALL users created in the window
    console.log('Checking all users for OG tag...');
    var allUsers=await db.collection('users').get();
    var ogCount=0;
    for(var j=0;j<allUsers.docs.length;j++){
        var doc=allUsers.docs[j];
        var d=doc.data();
        if(!d.createdAt)continue;
        var ct2=d.createdAt.toDate?d.createdAt.toDate().getTime():new Date(d.createdAt).getTime();
        if(ct2>=OG_START&&ct2<OG_END){
            var t2=d.tags||[];
            if(t2.indexOf('[OG]')===-1){
                t2.push('[OG]');
                await db.collection('users').doc(doc.id).update({tags:t2});
                ogCount++;
                console.log('OG tag added to '+d.username);
            }
        }
    }
    console.log('Done. OG tags added to '+ogCount+' users.');
    showNotification('Tags seeded!');
};
function renderTags(tags){
    if(!tags||tags.length===0) return '<span style="color:#666;font-size:13px;">No tags yet</span>';
    var colors={'[Dev]':'background:#fff;color:#000;','[IDev]':'background:#aaa;color:#000;','[Verified]':'background:#00f;color:#fff;','[OG]':'background:#ff0;color:#000;','[OG-Media]':'background:#f0f;color:#fff;'};
    return tags.map(function(t){var s=colors[t]||'background:#333;color:#fff;';return '<span style="display:inline-block;'+s+'padding:2px 8px;margin:2px;font-size:12px;border:2px solid #fff;">'+t+'</span>';}).join('');
}
async function applyTags(){
    if(!currentUser||!currentProfile) return;
    var username=(currentProfile.username||'').toLowerCase();
    // Always reload fresh from Firestore to avoid stale cache
    var freshDoc=await db.collection('users').doc(currentUser.uid).get();
    var freshData=freshDoc.data()||{};
    var existing=freshData.tags||[];
    var tags=existing.slice();
    var now=Date.now();
    // OG: active window OR retroactive via createdAt
    if(now>=OG_START&&now<OG_END&&tags.indexOf('[OG]')===-1) tags.push('[OG]');
    var createdAt=freshData.createdAt||currentProfile.createdAt;
    if(createdAt){
        var ct=createdAt.toDate?createdAt.toDate().getTime():new Date(createdAt).getTime();
        if(ct>=OG_START&&ct<OG_END&&tags.indexOf('[OG]')===-1) tags.push('[OG]');
    }
    // Special hardcoded tags
    (SPECIAL_TAGS[username]||[]).forEach(function(t){if(tags.indexOf(t)===-1)tags.push(t);});
    // OG-Media: 500+ posts
    var postSnap=await db.collection('posts').where('uid','==',currentUser.uid).get();
    if(postSnap.size>=500&&tags.indexOf('[OG-Media]')===-1) tags.push('[OG-Media]');
    var changed=JSON.stringify(tags.slice().sort())!==JSON.stringify(existing.slice().sort());
    if(changed) await db.collection('users').doc(currentUser.uid).update({tags:tags});
    currentProfile.tags=tags;
}

// ── PIN ──────────────────────────────────────────────────
function handlePinInput(e,dId,rId){var d=document.getElementById(dId),r=document.getElementById(rId),raw=d.value,state=pinStates[dId]||'',ns='';for(var i=0;i<raw.length;i++)ns+=(raw[i]==='\u2022')?(state[i]||''):raw[i];pinStates[dId]=ns;r.value=ns;if(!pinVisible)d.value='\u2022'.repeat(ns.length);}
function handlePinKey(e,dId,rId){if(e.key==='Backspace'){e.preventDefault();var d=document.getElementById(dId),r=document.getElementById(rId);pinStates[dId]=(pinStates[dId]||'').slice(0,-1);r.value=pinStates[dId];d.value=pinVisible?pinStates[dId]:'\u2022'.repeat(pinStates[dId].length);}}
function togglePin(dId,rId,btn){pinVisible=!pinVisible;var d=document.getElementById(dId),s=pinStates[dId]||'';d.value=pinVisible?s:'\u2022'.repeat(s.length);btn.innerHTML=pinVisible?'<i class="fas fa-eye-slash"></i>':'<i class="fas fa-eye"></i>';}
function toEmail(u){return u.replace('@','').toLowerCase()+'@usen.app';}

// ── REGISTER / LOGIN ──────────────────────────────────────
async function handleRegister(){
    var u=document.getElementById('loginUsername').value.trim().replace('@','');
    var p=document.getElementById('loginPinReal').value.trim();
    if(!u||!p){showNotification('Enter username and PIN!');return;}
    if(!/^[a-zA-Z0-9_]+$/.test(u)){showNotification('Username: letters, numbers, _ only');return;}
    if(p.length<6){showNotification('PIN needs at least 6 characters');return;}
    setBtn('registerBtn',true);
    var taken=await db.collection('usernames').doc(u.toLowerCase()).get();
    if(taken.exists){showNotification('Username taken!');setBtn('registerBtn',false);return;}
    try{
        var cred=await auth.createUserWithEmailAndPassword(toEmail(u),p);
        await db.collection('usernames').doc(u.toLowerCase()).set({uid:cred.user.uid});
        await db.collection('users').doc(cred.user.uid).set({username:u.toLowerCase(),displayName:'',bio:'',avatar:'',tags:[],createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    }catch(e){showNotification(fbErr(e));}
    setBtn('registerBtn',false);
}
async function handleLogin(){
    var u=document.getElementById('loginUsername').value.trim().replace('@','');
    var p=document.getElementById('loginPinReal').value.trim();
    if(!u||!p){showNotification('Enter username and PIN!');return;}
    setBtn('loginBtn',true);
    try{await auth.signInWithEmailAndPassword(toEmail(u),p);}
    catch(e){showNotification(fbErr(e));setBtn('loginBtn',false);}
}
async function handleLogout(){
    if(friendsUnsub)friendsUnsub();if(chatUnsub)chatUnsub();
    closeModal('settingsModal');await auth.signOut();
    pinStates['loginPin']='';
    document.getElementById('loginPin').value='';
    document.getElementById('loginPinReal').value='';
    document.getElementById('loginUsername').value='';
    setBtn('loginBtn',false);
    setBtn('registerBtn',false);
}

// ── FRIENDS / CHAT LIST ───────────────────────────────────
function loadFriends(){
    if(friendsUnsub)friendsUnsub();
    friendsUnsub=db.collection('users').doc(currentUser.uid).collection('friends')
        .onSnapshot(function(snap){renderChatList(snap.docs.map(function(d){return d.data();}));});
}
function renderChatList(friends){
    var list=document.getElementById('chatList');list.innerHTML='';
    if(friends.length===0){list.innerHTML='<div style="padding:40px 20px;text-align:center;color:#666;font-size:18px;border-bottom:3px solid #fff;">No friends yet. Add them!</div>';return;}
    friends.forEach(function(f){
        var item=document.createElement('div');item.className='chat-item';
        // Render placeholder first, then load live avatar from Firestore
        var avDiv=document.createElement('div');avDiv.className='chat-avatar';avDiv.id='av_'+f.uid;avDiv.textContent='?';
        var info=document.createElement('div');info.className='chat-info';
        var nameDiv=document.createElement('div');nameDiv.className='chat-name';nameDiv.textContent=f.displayName;
        var tagsDiv=document.createElement('div');tagsDiv.id='tags_'+f.uid;tagsDiv.style.marginBottom='2px';
        var prevDiv=document.createElement('div');prevDiv.className='chat-preview';prevDiv.textContent=f.lastMsg||'No messages yet';
        info.appendChild(nameDiv);info.appendChild(tagsDiv);info.appendChild(prevDiv);
        item.appendChild(avDiv);item.appendChild(info);
        item.onclick=function(){openChat(f);};
        list.appendChild(item);
        // Fetch live data from user doc
        db.collection('users').doc(f.uid).get().then(function(doc){
            if(!doc.exists)return;
            var data=doc.data();
            // Update avatar in DOM
            var avEl=document.getElementById('av_'+f.uid);
            if(avEl){
                if(data.avatar){var img=document.createElement('img');img.src=data.avatar;img.style.cssText='width:100%;height:100%;object-fit:cover;';avEl.innerHTML='';avEl.appendChild(img);}
                else avEl.textContent='?';
            }
            // Update tags in DOM
            var tEl=document.getElementById('tags_'+f.uid);
            if(tEl&&data.tags&&data.tags.length)tEl.innerHTML=renderTags(data.tags);
            // Sync avatar+tags into friend doc cache if changed
            if(data.avatar&&data.avatar!==f.avatar){
                db.collection('users').doc(currentUser.uid).collection('friends').doc(f.uid)
                    .update({avatar:data.avatar,tags:data.tags||[]}).catch(function(){});
                f.avatar=data.avatar;
            }
        }).catch(function(){});
    });
}
function filterChats(){
    var s=document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#chatList .chat-item').forEach(function(i){i.style.display=i.querySelector('.chat-name').textContent.toLowerCase().includes(s)?'':'none';});
}

// ── SMART SEARCH ─────────────────────────────────────────
var searchTimeout=null;
async function searchUsers(){
    var q=document.getElementById('addFriendInput').value.trim().replace('@','').toLowerCase();
    var el=document.getElementById('userSearchResults');
    if(!q){el.style.display='none';el.innerHTML='';return;}
    clearTimeout(searchTimeout);
    searchTimeout=setTimeout(async function(){
        var snap=await db.collection('usernames').orderBy(firebase.firestore.FieldPath.documentId()).startAt(q).endAt(q+'\uf8ff').limit(6).get();
        el.innerHTML='';
        if(snap.empty){el.style.display='none';return;}
        el.style.display='block';
        snap.forEach(function(doc){
            var uname=doc.id;
            if(uname===(currentProfile.username||''))return;
            var row=document.createElement('div');
            row.style.cssText="padding:10px 14px;border-top:3px solid #fff;cursor:pointer;font-family:'Courier Prime',monospace;font-size:15px;background:#000;color:#fff;";
            row.textContent='@'+uname;
            row.onmousedown=function(e){e.preventDefault();document.getElementById('addFriendInput').value=uname;el.style.display='none';};
            el.appendChild(row);
        });
    },200);
}

// ── ADD FRIEND ────────────────────────────────────────────
async function addFriend(){
    var username=document.getElementById('addFriendInput').value.trim().replace('@','').toLowerCase();
    var el=document.getElementById('userSearchResults');if(el)el.style.display='none';
    if(!username){showNotification('Enter a username!');return;}
    if(username===(currentProfile.username||'')){showNotification("That's you lol");return;}
    var udoc=await db.collection('usernames').doc(username).get();
    if(!udoc.exists){showNotification("User doesn't exist!");return;}
    var theirUid=udoc.data().uid;
    var blocked=await db.collection('users').doc(theirUid).collection('blocked').doc(currentUser.uid).get();
    if(blocked.exists){showNotification("Can't add that user.");return;}
    var ex=await db.collection('users').doc(currentUser.uid).collection('friends').doc(theirUid).get();
    if(ex.exists){showNotification('Already friends!');return;}
    var already=await db.collection('users').doc(theirUid).collection('friendRequests').doc(currentUser.uid).get();
    if(already.exists){showNotification('Request already sent!');return;}
    await db.collection('users').doc(theirUid).collection('friendRequests').doc(currentUser.uid).set({
        fromUid:currentUser.uid,fromUsername:currentProfile.username,
        fromDisplayName:currentProfile.displayName,fromAvatar:currentProfile.avatar||'',
        timestamp:firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('addFriendInput').value='';
    showNotification('Friend request sent to @'+username+'!');
}

    snap.forEach(function(doc){
        var f=doc.data();var item=document.createElement('div');item.className='account-item';
        var avEl=document.createElement('div');avEl.className='chat-avatar';avEl.textContent='?';
        var info=document.createElement('div');
        info.innerHTML='<div style="letter-spacing:-0.5px;">'+f.displayName+'</div><div style="color:#aaa;font-size:12px;">@'+f.username+'</div>';

        var remBtn=document.createElement('button');remBtn.className='btn';remBtn.style.cssText='padding:6px;font-size:12px;';remBtn.textContent='Remove';remBtn.onclick=function(){removeFriend(doc.id);};

async function removeFriend(uid){await db.collection('users').doc(currentUser.uid).collection('friends').doc(uid).delete();generateAccountsList();showNotification('Removed.');}
async function blockUser(uid,username){
    await db.collection('users').doc(currentUser.uid).collection('blocked').doc(uid).set({uid:uid,username:username,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    await db.collection('users').doc(currentUser.uid).collection('friends').doc(uid).delete().catch(function(){});
    await db.collection('users').doc(uid).collection('friends').doc(currentUser.uid).delete().catch(function(){});
    generateAccountsList();showNotification('@'+username+' blocked.');
}

function listenForFriendRequests(){
    db.collection('users').doc(currentUser.uid).collection('friendRequests')
        .onSnapshot(function(snap){snap.docChanges().forEach(function(ch){if(ch.type==='added')showFriendRequestNotif(ch.doc.data());});});

    acc.onclick=async function(){await acceptFriendRequest(req);notif.remove();};
    var dec=document.createElement('button');dec.textContent='Decline';dec.style.cssText="flex:1;padding:10px;background:#000;border:3px solid #fff;color:#fff;font-family:'Courier Prime',monospace;font-size:14px;cursor:pointer;";

async function acceptFriendRequest(req){
    await db.collection('users').doc(currentUser.uid).collection('friends').doc(req.fromUid).set({uid:req.fromUid,username:req.fromUsername,displayName:req.fromDisplayName,avatar:req.fromAvatar||'',lastMsg:''});
    await db.collection('users').doc(req.fromUid).collection('friends').doc(currentUser.uid).set({uid:currentUser.uid,username:currentProfile.username,displayName:currentProfile.displayName,avatar:currentProfile.avatar||'',lastMsg:''});
    await db.collection('users').doc(currentUser.uid).collection('friendRequests').doc(req.fromUid).delete();
    showNotification('@'+req.fromUsername+' added!');
}

function buildMsgEl(m){
    var mine=m.fromUid===currentUser.uid;
    var wrap=document.createElement('div');wrap.style.cssText='display:flex;flex-direction:column;align-items:'+(mine?'flex-end':'flex-start')+';margin-bottom:14px;';

    if(m.type==='image'){var img=document.createElement('img');img.src=m.data;img.style.cssText='max-width:220px;max-height:220px;display:block;cursor:pointer;';img.onclick=function(){window.open(m.data);};bubble.style.padding='4px';bubble.appendChild(img);}
    else if(m.type==='video'){var vid=document.createElement('video');vid.src=m.data;vid.controls=true;vid.style.cssText='max-width:220px;display:block;';bubble.style.padding='4px';bubble.appendChild(vid);}
    else if(m.type==='audio'){var aud=document.createElement('audio');aud.src=m.data;aud.controls=true;aud.style.cssText='max-width:220px;';bubble.appendChild(aud);}
    else if(m.type==='file'){var link=document.createElement('a');link.href=m.data;link.download=m.fileName||'file';link.style.cssText='color:'+(mine?'#000':'#fff')+';text-decoration:underline;';link.textContent='[file] '+(m.fileName||'File');bubble.appendChild(link);}
    else if(m.type==='callLog'){var icon=m.withVideo?'[video call]':'[voice call]';var sm=m.callStatus==='rejected'?' x':m.callStatus==='calling'?' ...':' ok';var dur=(m.callStatus==='ended'&&m.callDuration!==undefined)?' - '+m.callDuration+'s':'';bubble.textContent=icon+sm+dur;}
    else{bubble.textContent=m.text||'';}
    var time=document.createElement('div');time.style.cssText='font-size:11px;color:#666;margin-top:4px;';time.textContent=m.timestamp?new Date(m.timestamp.toDate()).toLocaleTimeString():'';
    wrap.appendChild(bubble);wrap.appendChild(time);return wrap;
}
async function sendMsg(chatId,friend){var inp=document.getElementById('chatInput');if(!inp)return;var text=inp.value.trim();if(!text)return;inp.value='';await db.collection('chats').doc(chatId).collection('messages').add({type:'text',text:text,fromUid:currentUser.uid,fromName:currentProfile.displayName,timestamp:firebase.firestore.FieldValue.serverTimestamp()});updateLastMsg(friend,text);}
async function sendFile(chatId,friend,file){if(!file)return;if(file.size>900000){showNotification('File too big (max ~900KB)');return;}showNotification('Sending...');var reader=new FileReader();reader.onload=async function(e){var type=file.type.startsWith('image')?'image':file.type.startsWith('video')?'video':file.type.startsWith('audio')?'audio':'file';await db.collection('chats').doc(chatId).collection('messages').add({type:type,data:e.target.result,fileName:file.name,fromUid:currentUser.uid,fromName:currentProfile.displayName,timestamp:firebase.firestore.FieldValue.serverTimestamp()});updateLastMsg(friend,type==='image'?'[image]':type==='video'?'[video]':type==='audio'?'[voice]':'[file] '+file.name);};reader.readAsDataURL(file);}
function startRecording(){if(isRecording)return;navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){isRecording=true;audioChunks=[];mediaRecorder=new MediaRecorder(stream);mediaRecorder.ondataavailable=function(e){audioChunks.push(e.data);};mediaRecorder.start();var btn=document.getElementById('voiceRecBtn');if(btn)btn.style.background='#f00';showNotification('Recording... release to send');}).catch(function(){showNotification('Mic access denied');});}
function stopRecording(chatId,friend){if(!isRecording||!mediaRecorder)return;isRecording=false;mediaRecorder.stop();mediaRecorder.onstop=function(){var blob=new Blob(audioChunks,{type:'audio/webm'});mediaRecorder.stream.getTracks().forEach(function(t){t.stop();});var btn=document.getElementById('voiceRecBtn');if(btn)btn.style.background='#000';if(blob.size>900000){showNotification('Voice message too long');return;}var reader=new FileReader();reader.onload=async function(e){await db.collection('chats').doc(chatId).collection('messages').add({type:'audio',data:e.target.result,fromUid:currentUser.uid,fromName:currentProfile.displayName,timestamp:firebase.firestore.FieldValue.serverTimestamp()});updateLastMsg(friend,'[voice]');};reader.readAsDataURL(blob);};}
function updateLastMsg(friend,preview){var p={lastMsg:preview};db.collection('users').doc(currentUser.uid).collection('friends').doc(friend.uid).update(p);db.collection('users').doc(friend.uid).collection('friends').doc(currentUser.uid).update(p).catch(function(){});}

// ── PROFILE VIEW ─────────────────────────────────────────
async function viewProfile(friend){
    var doc=await db.collection('users').doc(friend.uid).get();var data=doc.data();
    var modal=document.getElementById('profileViewModal');
    if(!modal){modal=document.createElement('div');modal.id='profileViewModal';modal.className='modal';document.body.appendChild(modal);}
    modal.innerHTML='';modal.classList.add('active');
    var header=document.createElement('div');header.className='modal-header';header.innerHTML='<span>Profile</span>';
    var cb=document.createElement('button');cb.className='modal-close';cb.textContent='X';cb.onclick=function(){modal.classList.remove('active');};header.appendChild(cb);modal.appendChild(header);
    var content=document.createElement('div');content.className='modal-content';content.style.cssText='display:flex;flex-direction:column;align-items:center;padding:40px 20px;gap:16px;';
    // Avatar
    var av=document.createElement('div');av.style.cssText='width:100px;height:100px;border:3px solid #fff;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:48px;background:#333;';
    if(data.avatar){var avImg=document.createElement('img');avImg.src=data.avatar;avImg.style.cssText='width:100%;height:100%;object-fit:cover;';av.appendChild(avImg);}else{av.textContent='?';}
    content.appendChild(av);
    // Fields

        var wrap=document.createElement('div');wrap.style.cssText='width:100%;border:3px solid #fff;padding:15px;';
        var label=document.createElement('div');label.style.cssText='font-size:12px;color:#666;margin-bottom:6px;';label.textContent=row[0];
        var val=document.createElement('div');val.style.cssText='font-size:16px;letter-spacing:-0.5px;word-break:break-word;';val.textContent=row[1];
        wrap.appendChild(label);wrap.appendChild(val);content.appendChild(wrap);
    });
    // Tags - always shown
    var tagWrap=document.createElement('div');tagWrap.style.cssText='width:100%;border:3px solid #fff;padding:15px;';
    var tagLabel=document.createElement('div');tagLabel.style.cssText='font-size:12px;color:#666;margin-bottom:8px;';tagLabel.textContent='Tags';
    var tagVal=document.createElement('div');tagVal.innerHTML=renderTags(data.tags||[]);
    tagWrap.appendChild(tagLabel);tagWrap.appendChild(tagVal);content.appendChild(tagWrap);
    modal.appendChild(content);
}

// ── CALLS ────────────────────────────────────────────────
async function startCall(friend,withVideo){
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:withVideo}).catch(function(){showNotification('Camera/mic denied');return null;});
    if(!localStream)return;
    peerConnection=new RTCPeerConnection(ICE);
    localStream.getTracks().forEach(function(t){peerConnection.addTrack(t,localStream);});
    openCallModal(friend.displayName,withVideo);
    if(withVideo){var lv=document.getElementById('localVideo');if(lv)lv.srcObject=localStream;}
    peerConnection.ontrack=function(e){var rv=document.getElementById('remoteVideo');if(rv)rv.srcObject=e.streams[0];};
    peerConnection.onicecandidate=function(e){if(e.candidate)db.collection('calls').doc(activeChatId).collection('callerCandidates').add(e.candidate.toJSON());};
    var offer=await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    await db.collection('calls').doc(activeChatId).set({offer:{type:offer.type,sdp:offer.sdp},callerId:currentUser.uid,calleeId:friend.uid,callerName:currentProfile.displayName,withVideo:withVideo,status:'calling'});
    var callMsgRef=await db.collection('chats').doc(activeChatId).collection('messages').add({type:'callLog',callStatus:'calling',withVideo:withVideo,fromUid:currentUser.uid,fromName:currentProfile.displayName,timestamp:firebase.firestore.FieldValue.serverTimestamp()});
    if(callDocUnsub)callDocUnsub();
    callDocUnsub=db.collection('calls').doc(activeChatId).onSnapshot(async function(snap){
        var data=snap.data();if(!data)return;
        if(data.answer&&peerConnection&&!peerConnection.currentRemoteDescription){await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));callStartTime=Date.now();startCallTimer();callMsgRef.update({callStatus:'accepted'});var t=document.getElementById('callTimer');if(t)t.textContent='00:00';}
        if(data.status==='rejected'){callMsgRef.update({callStatus:'rejected'});endCallCleanup();}
        if(data.status==='ended'){var dur=callStartTime?Math.floor((Date.now()-callStartTime)/1000):0;callMsgRef.update({callStatus:'ended',callDuration:dur});endCallCleanup();}
    });
    db.collection('calls').doc(activeChatId).collection('calleeCandidates').onSnapshot(function(snap){snap.docChanges().forEach(async function(ch){if(ch.type==='added'&&peerConnection)await peerConnection.addIceCandidate(new RTCIceCandidate(ch.doc.data())).catch(function(){});});});
    db.collection('users').doc(friend.uid).update({incomingCall:{callId:activeChatId,callerName:currentProfile.displayName,withVideo:withVideo}});
}
function listenForCall(){
    db.collection('users').doc(currentUser.uid).onSnapshot(function(snap){var data=snap.data();if(!data||!data.incomingCall)return;var call=data.incomingCall;db.collection('users').doc(currentUser.uid).update({incomingCall:firebase.firestore.FieldValue.delete()});if(peerConnection)return;showIncomingCall(call);});
}
function showIncomingCall(call){
    var ex=document.getElementById('incomingCallModal');if(ex)ex.remove();
    var modal=document.createElement('div');modal.id='incomingCallModal';modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#000;border:3px solid #fff;z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;';
    var ne=document.createElement('div');ne.style.cssText='font-size:28px;letter-spacing:-1px;';ne.textContent=call.callerName;modal.appendChild(ne);
    var sub=document.createElement('div');sub.style.cssText='color:#aaa;font-size:16px;';sub.textContent='Incoming '+(call.withVideo?'video':'voice')+' call...';modal.appendChild(sub);
    var row=document.createElement('div');row.style.cssText='display:flex;gap:20px;';
    var acc=document.createElement('button');acc.textContent='Accept';acc.style.cssText="padding:15px 30px;background:#0f0;border:3px solid #fff;color:#000;font-family:'Courier Prime',monospace;font-size:16px;cursor:pointer;";acc.onclick=function(){modal.remove();acceptCall(call.callId,call.withVideo);};
    var rej=document.createElement('button');rej.textContent='Reject';rej.style.cssText="padding:15px 30px;background:#f00;border:3px solid #fff;color:#fff;font-family:'Courier Prime',monospace;font-size:16px;cursor:pointer;";rej.onclick=function(){modal.remove();db.collection('calls').doc(call.callId).update({status:'rejected'}).catch(function(){});};
    row.appendChild(acc);row.appendChild(rej);modal.appendChild(row);
    var watcher=db.collection('calls').doc(call.callId).onSnapshot(function(snap){var d=snap.data();if(d&&(d.status==='ended'||d.status==='rejected')){modal.remove();watcher();}});
    document.body.appendChild(modal);
}
async function acceptCall(callId,withVideo){
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:withVideo}).catch(function(){return null;});if(!localStream)return;
    peerConnection=new RTCPeerConnection(ICE);localStream.getTracks().forEach(function(t){peerConnection.addTrack(t,localStream);});
    var callDoc=await db.collection('calls').doc(callId).get();var callData=callDoc.data();
    openCallModal(callData.callerName||'Call',withVideo);
    if(withVideo){var lv=document.getElementById('localVideo');if(lv)lv.srcObject=localStream;}
    peerConnection.ontrack=function(e){var rv=document.getElementById('remoteVideo');if(rv)rv.srcObject=e.streams[0];};
    peerConnection.onicecandidate=function(e){if(e.candidate)db.collection('calls').doc(callId).collection('calleeCandidates').add(e.candidate.toJSON());};
    await peerConnection.setRemoteDescription(new RTCSessionDescription(callData.offer));
    var answer=await peerConnection.createAnswer();await peerConnection.setLocalDescription(answer);
    await db.collection('calls').doc(callId).update({answer:{type:answer.type,sdp:answer.sdp}});
    callStartTime=Date.now();startCallTimer();var t=document.getElementById('callTimer');if(t)t.textContent='00:00';
    if(callDocUnsub)callDocUnsub();
    callDocUnsub=db.collection('calls').doc(callId).onSnapshot(function(snap){var d=snap.data();if(d&&d.status==='ended')endCallCleanup();});
    db.collection('calls').doc(callId).collection('callerCandidates').onSnapshot(function(snap){snap.docChanges().forEach(async function(ch){if(ch.type==='added'&&peerConnection)await peerConnection.addIceCandidate(new RTCIceCandidate(ch.doc.data())).catch(function(){});});});
}
function startCallTimer(){if(callTimerInterval)clearInterval(callTimerInterval);callTimerInterval=setInterval(function(){var el=document.getElementById('callTimer');if(!el){clearInterval(callTimerInterval);return;}var s=Math.floor((Date.now()-callStartTime)/1000),m=Math.floor(s/60);s=s%60;el.textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;},1000);}
function endCall(){if(activeChatId)db.collection('calls').doc(activeChatId).update({status:'ended'}).catch(function(){});var dur=callStartTime?Math.floor((Date.now()-callStartTime)/1000):0;if(activeChatId){db.collection('chats').doc(activeChatId).collection('messages').where('type','==','callLog').where('fromUid','==',currentUser.uid).orderBy('timestamp','desc').limit(1).get().then(function(snap){if(!snap.empty)snap.docs[0].ref.update({callStatus:'ended',callDuration:dur});}).catch(function(){});}endCallCleanup();}
function endCallCleanup(){if(callDocUnsub){callDocUnsub();callDocUnsub=null;}if(callTimerInterval){clearInterval(callTimerInterval);callTimerInterval=null;}if(peerConnection){peerConnection.close();peerConnection=null;}if(localStream){localStream.getTracks().forEach(function(t){t.stop();});localStream=null;}callStartTime=null;var modal=document.getElementById('callModal');if(modal)modal.remove();}
function openCallModal(name,withVideo){
    var ex=document.getElementById('callModal');if(ex)ex.remove();
    var modal=document.createElement('div');modal.id='callModal';modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:#000;border:3px solid #fff;z-index:2000;display:flex;flex-direction:column;';
    var hd=document.createElement('div');hd.style.cssText='padding:16px 20px;border-bottom:3px solid #fff;font-size:20px;letter-spacing:-0.5px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;';
    var ns=document.createElement('span');ns.textContent=name;var ts=document.createElement('span');ts.id='callTimer';ts.style.cssText='font-size:16px;color:#aaa;letter-spacing:0;';ts.textContent='Calling...';hd.appendChild(ns);hd.appendChild(ts);modal.appendChild(hd);
    var area=document.createElement('div');area.style.cssText='flex:1;position:relative;background:#111;display:flex;align-items:center;justify-content:center;';
    if(withVideo){var rv=document.createElement('video');rv.id='remoteVideo';rv.autoplay=true;rv.playsinline=true;rv.style.cssText='width:100%;height:100%;object-fit:cover;';area.appendChild(rv);var lv=document.createElement('video');lv.id='localVideo';lv.autoplay=true;lv.playsinline=true;lv.muted=true;lv.style.cssText='position:absolute;bottom:20px;right:20px;width:120px;height:90px;border:3px solid #fff;object-fit:cover;background:#000;';area.appendChild(lv);}
    else{var icon=document.createElement('div');icon.style.cssText='font-size:60px;color:#fff;';icon.textContent='[call]';area.appendChild(icon);var ra=document.createElement('audio');ra.id='remoteVideo';ra.autoplay=true;area.appendChild(ra);}
    modal.appendChild(area);
    var ctrl=document.createElement('div');ctrl.style.cssText='display:flex;justify-content:center;padding:20px;border-top:3px solid #fff;flex-shrink:0;';
    var endBtn=document.createElement('button');endBtn.textContent='End Call';endBtn.style.cssText="padding:15px 30px;background:#f00;border:3px solid #fff;color:#fff;font-family:'Courier Prime',monospace;font-size:16px;cursor:pointer;letter-spacing:-0.5px;";endBtn.onclick=function(){endCall();};ctrl.appendChild(endBtn);modal.appendChild(ctrl);
    document.body.appendChild(modal);
}

// ── FEED ──────────────────────────────────────────────────
async function openSocialFeed(){
    document.getElementById('feedModal').classList.add('active');
    var fc=document.getElementById('feedContent');fc.innerHTML='<div style="color:#666;padding:20px;text-align:center;">Loading...</div>';
    var snap=await db.collection('posts').orderBy('timestamp','desc').limit(30).get();fc.innerHTML='';
    if(snap.empty){fc.innerHTML='<div style="padding:20px;text-align:center;color:#666;">No posts yet!</div>';return;}

}
async function uploadPost(){

    setBtn('postBtn',true);

function openSettings(){document.getElementById('settingsDisplayName').value=currentProfile.displayName||'';document.getElementById('settingsModal').classList.add('active');}
async function updateDisplayName(){var name=document.getElementById('settingsDisplayName').value.trim();if(!name)return;await db.collection('users').doc(currentUser.uid).update({displayName:name});currentProfile.displayName=name;showNotification('Name updated!');}
async function handleSettingsAvatar(){
    var file=document.getElementById('settingsAvatarInput').files[0];if(!file)return;
    var r=new FileReader();
    r.onload=async function(e){
        var avatar=e.target.result;
        await db.collection('users').doc(currentUser.uid).update({avatar:avatar});
        currentProfile.avatar=avatar;
        // Push to all friends so their chat list updates immediately
        var fsnap=await db.collection('users').doc(currentUser.uid).collection('friends').get();
        fsnap.forEach(function(doc){db.collection('users').doc(doc.id).collection('friends').doc(currentUser.uid).update({avatar:avatar}).catch(function(){});});
        showNotification('Avatar updated!');
    };
    r.readAsDataURL(file);
}

function showNotification(text){var old=document.querySelector('.usen-notif');if(old)old.remove();var n=document.createElement('div');n.className='usen-notif';n.style.cssText="position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:15px 30px;border:3px solid #000;z-index:99999;font-family:'Courier Prime',monospace;font-size:16px;letter-spacing:-0.5px;white-space:nowrap;";n.textContent=text;document.body.appendChild(n);setTimeout(function(){n.remove();},2500);}
