<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usen</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; color:#fff; font-family:'Courier Prime',monospace; font-size:16px; overflow:hidden; }

        @keyframes fall { to { transform:translateY(100vh); } }
        .falling-dot { position:fixed; background:#fff; border-radius:50%; animation:fall linear forwards; pointer-events:none; z-index:1; box-shadow:0 0 4px rgba(255,255,255,0.8); }

        .page { display:none; width:100%; height:100vh; position:absolute; top:0; left:0; }
        .page.active { display:flex; }

        #loadingPage { flex-direction:column; justify-content:center; align-items:center; background:#000; border:3px solid #fff; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .spinner { width:40px; height:40px; border:3px solid #333; border-top-color:#fff; border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:20px; }

        #loginPage { flex-direction:column; justify-content:center; align-items:center; background:#000; border:3px solid #fff; }
        .login-container { width:90%; max-width:500px; border:3px solid #fff; padding:30px; background:#000; }
        .login-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:3px solid #fff; padding-bottom:15px; font-size:32px; letter-spacing:-1px; }
        .login-label { font-size:28px; margin:20px 0 15px; letter-spacing:-1px; }
        .login-input { width:100%; background:#000; border:3px solid #fff; padding:15px; color:#fff; font-family:'Courier Prime',monospace; font-size:18px; margin-bottom:15px; text-align:center; transition:all 0.3s; }
        .login-input:focus { outline:none; background:#111; }
        .login-input::placeholder { color:#666; }
        .pin-wrapper { position:relative; margin-bottom:15px; }
        .pin-wrapper .login-input { margin-bottom:0; padding-right:50px; }
        .pin-toggle { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:#fff; cursor:pointer; font-size:18px; padding:4px; }
        .login-buttons { display:grid; grid-template-columns:1fr 1fr; gap:15px; margin:30px 0; }
        .btn { padding:15px; background:#000; border:3px solid #fff; color:#fff; font-family:'Courier Prime',monospace; font-size:18px; cursor:pointer; transition:all 0.3s; letter-spacing:-0.5px; }
        .btn:hover { background:#fff; color:#000; transform:scale(1.05); }
        .btn:active { transform:scale(0.98); }
        .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
        .login-message { border:3px solid #fff; padding:20px; margin-top:20px; text-align:center; line-height:1.8; font-size:16px; }

        #setupPage { flex-direction:column; justify-content:center; align-items:center; background:#000; border:3px solid #fff; }
        .setup-container { width:90%; max-width:500px; border:3px solid #fff; padding:30px; background:#000; max-height:90vh; overflow-y:auto; }
        .setup-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; border-bottom:3px solid #fff; padding-bottom:15px; font-size:32px; letter-spacing:-1px; }
        .setup-label { font-size:18px; margin-bottom:10px; letter-spacing:-0.5px; }
        .setup-input { width:100%; background:#000; border:3px solid #fff; padding:12px; color:#fff; font-family:'Courier Prime',monospace; font-size:16px; margin-bottom:10px; }
        .setup-textarea { width:100%; background:#000; border:3px solid #fff; padding:12px; color:#fff; font-family:'Courier Prime',monospace; font-size:14px; min-height:100px; resize:vertical; }
        .profile-preview { display:flex; gap:15px; align-items:flex-start; margin-bottom:20px; padding:15px; border:3px solid #fff; }
        .profile-avatar { width:80px; height:80px; background:#333; border:3px solid #fff; display:flex; align-items:center; justify-content:center; font-size:32px; flex-shrink:0; cursor:pointer; overflow:hidden; }
        .profile-avatar img { width:100%; height:100%; object-fit:cover; }
        .setup-done-btn { width:100%; padding:15px; background:#000; border:3px solid #fff; color:#fff; font-family:'Courier Prime',monospace; font-size:18px; cursor:pointer; margin-top:20px; transition:all 0.3s; letter-spacing:-0.5px; }
        .setup-done-btn:hover { background:#fff; color:#000; }
        .setup-done-btn:disabled { opacity:0.4; cursor:not-allowed; }

        #homePage { flex-direction:column; background:#000; }
        .home-header { display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:3px solid #fff; font-size:28px; letter-spacing:-1px; }
        .search-container { display:flex; align-items:center; border:3px solid #fff; padding:8px; flex:1; margin:0 15px; }
        .search-input { background:transparent; border:none; color:#fff; font-family:'Courier Prime',monospace; font-size:16px; flex:1; padding:8px; }
        .search-input:focus { outline:none; }
        .search-input::placeholder { color:#666; }
        .chat-list { flex:1; overflow-y:auto; }
        .chat-item { display:grid; grid-template-columns:60px 1fr; gap:10px; align-items:center; padding:15px; border-bottom:3px solid #fff; cursor:pointer; transition:all 0.3s; }
        .chat-item:hover { background:#111; transform:translateX(5px); }
        .chat-avatar { width:60px; height:60px; background:#333; border:3px solid #fff; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; overflow:hidden; }
        .chat-avatar img { width:100%; height:100%; object-fit:cover; }
        .chat-info { min-width:0; }
        .chat-name { font-size:16px; margin-bottom:5px; letter-spacing:-0.5px; }
        .chat-preview { font-size:14px; color:#aaa; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        .bottom-nav { display:grid; grid-template-columns:repeat(5,1fr); border-top:3px solid #fff; height:70px; }
        .nav-btn { background:#000; border-right:3px solid #fff; border-top:none; border-bottom:none; border-left:none; color:#fff; font-size:24px; cursor:pointer; transition:all 0.3s; display:flex; align-items:center; justify-content:center; }
        .nav-btn:last-child { border-right:none; }
        .nav-btn:hover { background:#111; }
        .nav-btn.active { background:#fff; color:#000; }

        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000; border:3px solid #fff; z-index:1000; flex-direction:column; }
        .modal.active { display:flex; }
        .modal-header { border-bottom:3px solid #fff; padding:20px; font-size:24px; display:flex; justify-content:space-between; align-items:center; letter-spacing:-0.5px; flex-shrink:0; }
        .modal-close { background:none; border:none; color:#fff; font-size:24px; cursor:pointer; font-family:'Courier Prime',monospace; }
        .modal-content { flex:1; overflow-y:auto; padding:20px; }

        .menu-modal { display:none; position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#000; border:3px solid #fff; z-index:999; min-width:300px; }
        .menu-modal.active { display:block; }
        .menu-option { padding:20px; border-bottom:3px solid #fff; cursor:pointer; font-size:18px; transition:all 0.3s; text-align:center; letter-spacing:-0.5px; }
        .menu-option:last-child { border-bottom:none; }
        .menu-option:hover { background:#fff; color:#000; }

        .accounts-list { display:flex; flex-direction:column; gap:10px; }
        .account-item { display:grid; grid-template-columns:60px 1fr 80px; gap:10px; align-items:center; padding:15px; border:3px solid #fff; background:#000; }

        .post-textarea { width:100%; background:#000; border:3px solid #fff; padding:15px; color:#fff; font-family:'Courier Prime',monospace; font-size:16px; min-height:100px; margin-bottom:15px; }
        .upload-btn { width:100%; padding:15px; background:#000; border:3px solid #fff; color:#fff; font-family:'Courier Prime',monospace; font-size:16px; cursor:pointer; transition:all 0.3s; letter-spacing:-0.5px; }
        .upload-btn:hover { background:#fff; color:#000; }
        .upload-btn:disabled { opacity:0.4; cursor:not-allowed; }

        .feed-item { border:3px solid #fff; padding:20px; margin-bottom:15px; background:#000; transition:all 0.3s; }
        .feed-item:hover { background:#111; }
        .feed-user { margin-bottom:6px; font-size:16px; letter-spacing:-0.5px; }
        .feed-content { font-size:14px; line-height:1.6; word-break:break-word; }

        .settings-option { display:grid; grid-template-columns:1fr auto; align-items:center; padding:20px; border-bottom:3px solid #fff; gap:20px; }
        .settings-option:last-child { border-bottom:none; }
        .settings-label { font-size:16px; letter-spacing:-0.5px; }
        .settings-input { background:#000; border:3px solid #fff; padding:10px; color:#fff; font-family:'Courier Prime',monospace; font-size:14px; width:200px; }
        .settings-input:focus { outline:none; }

        @media(max-width:768px) { .bottom-nav { height:60px; } .nav-btn { font-size:20px; } }
    </style>
</head>
<body>

<div id="loadingPage" class="page active">
    <div class="spinner"></div>
    <div style="letter-spacing:-1px;font-size:20px;">Usen</div>
</div>

<div id="loginPage" class="page">
    <div class="login-container">
        <div class="login-header">
            <span>Usen</span>
            <span style="font-size:48px;">44</span>
        </div>
        <div class="login-label">Login</div>
        <input type="text" class="login-input" id="loginUsername" placeholder="@Username" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        <div class="pin-wrapper">
            <input type="text" class="login-input" id="loginPin" placeholder="PIN" maxlength="20" autocomplete="off" spellcheck="false" style="letter-spacing:6px;color:#fff;" oninput="handlePinInput(event,'loginPin','loginPinReal')" onkeydown="handlePinKey(event,'loginPin','loginPinReal')" />
            <input type="hidden" id="loginPinReal" />
            <button class="pin-toggle" onclick="togglePin('loginPin','loginPinReal',this)" type="button" tabindex="-1"><i class="fas fa-eye"></i></button>
        </div>
        <div class="login-buttons">
            <button class="btn" id="loginBtn" onclick="handleLogin()">Login</button>
            <button class="btn" id="registerBtn" onclick="handleRegister()">Register</button>
        </div>
        <div class="login-message">
            Christ Is Lord.<br>
            Dont Be Stupid Here,<br>
            Dont Trust Randoms.
        </div>
    </div>
</div>

<div id="setupPage" class="page">
    <div class="setup-container">
        <div class="setup-header"><span>Usen</span><span>44</span></div>
        <div class="profile-preview">
            <div class="profile-avatar" onclick="document.getElementById('avatarInput').click()">
                <img id="avatarImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='30' r='20' fill='%23666'/%3E%3Cpath d='M 10 100 Q 10 60 50 60 Q 90 60 90 100' fill='%23666'/%3E%3C/svg%3E" />
            </div>
            <div>
                <div id="profileNameDisplay" style="font-size:16px;letter-spacing:-0.5px;">Your Name</div>
                <div id="profileUsernameDisplay" style="font-size:14px;color:#aaa;">@username</div>
            </div>
        </div>
        <input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="handleAvatarUpload()" />
        <div style="margin-bottom:25px;">
            <div class="setup-label">Display Name *</div>
            <input type="text" class="setup-input" id="setupDisplayName" placeholder="Your Display Name" oninput="updateProfilePreview()" />
        </div>
        <div style="margin-bottom:25px;">
            <div class="setup-label">Bio <span style="color:#666;font-size:14px;">(Optional)</span></div>
            <textarea class="setup-textarea" id="setupBio" placeholder="Tell us about yourself..."></textarea>
        </div>
        <button class="setup-done-btn" id="setupDoneBtn" onclick="completeSetup()">Done!</button>
    </div>
</div>

<div id="homePage" class="page">
    <div class="home-header">
        <span>Usen</span>
        <div class="search-container">
            <i class="fas fa-search" style="margin-right:10px;color:#666;"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search..." oninput="filterChats()" />
        </div>
    </div>
    <div class="chat-list" id="chatList"></div>
    <div class="bottom-nav">
        <button class="nav-btn active" id="navHome" title="Home">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </button>
        <button class="nav-btn" onclick="openSettings()" title="Settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m6.08 0l4.24-4.24M1 12h6m6 0h6m-1.78 7.78l-4.24-4.24m-6.08 0l-4.24 4.24"></path></svg>
        </button>
        <button class="nav-btn" onclick="openMenuModal()" style="background:#fff;color:#000;font-size:36px;">+</button>
        <button class="nav-btn" onclick="openSocialFeed()" title="Feed">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><polyline points="8 21 16 21"></polyline><line x1="12" y1="17" x2="12" y2="21"></line></svg>
        </button>
        <button class="nav-btn" onclick="openAccountsModal()" title="Friends">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </button>
    </div>
</div>

<div class="menu-modal" id="menuModal">
    <div class="menu-option" onclick="openAccountsModal()">Accounts</div>
    <div class="menu-option" onclick="openSocialModal()">Social</div>
</div>

<div class="modal" id="accountsModal">
    <div class="modal-header"><span>Friends</span><button class="modal-close" onclick="closeModal('accountsModal')">X</button></div>
    <div class="modal-content">
        <div style="margin-bottom:30px;padding-bottom:20px;border-bottom:3px solid #fff;">
            <div style="margin-bottom:10px;letter-spacing:-0.5px;">Add Friend</div>
            <div style="display:flex;gap:10px;">
                <input type="text" id="addFriendInput" placeholder="Enter @username" style="flex:1;border:3px solid #fff;background:#000;padding:10px;color:#fff;font-family:'Courier Prime',monospace;font-size:16px;" onkeydown="if(event.key==='Enter') addFriend()" />
                <button class="btn" onclick="addFriend()" style="padding:10px 20px;">+</button>
            </div>
        </div>
        <div style="margin-bottom:15px;letter-spacing:-0.5px;">Your Friends</div>
        <div id="accountsList" class="accounts-list"></div>
    </div>
</div>

<div class="modal" id="socialModal">
    <div class="modal-header"><span>Create Post</span><button class="modal-close" onclick="closeModal('socialModal')">X</button></div>
    <div class="modal-content">
        <textarea class="post-textarea" id="postText" placeholder="What's on your mind..."></textarea>
        <button class="upload-btn" id="postBtn" onclick="uploadPost()">Post</button>
    </div>
</div>

<div class="modal" id="feedModal">
    <div class="modal-header"><span>Social Feed</span><button class="modal-close" onclick="closeModal('feedModal')">X</button></div>
    <div class="modal-content" id="feedContent"></div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-header"><span>Settings</span><button class="modal-close" onclick="closeModal('settingsModal')">X</button></div>
    <div class="modal-content">
        <div class="settings-option">
            <div class="settings-label">Display Name</div>
            <input type="text" class="settings-input" id="settingsDisplayName" onchange="updateDisplayName()" />
        </div>
        <div class="settings-option">
            <div class="settings-label">Change Avatar</div>
            <button class="btn" onclick="document.getElementById('settingsAvatarInput').click()" style="width:200px;">Upload</button>
        </div>
        <div class="settings-option">
            <div class="settings-label" style="color:#f55;">Logout</div>
            <button class="btn" onclick="handleLogout()" style="width:200px;border-color:#f55;color:#f55;">Logout</button>
        </div>
        <input type="file" id="settingsAvatarInput" accept="image/*" style="display:none;" onchange="handleSettingsAvatar()" />
    </div>
</div>

<script>
firebase.initializeApp({
    apiKey: "AIzaSyBRFwLZLhLXVY6EtrZiLOI-wnHijtvke_g",
    authDomain: "usen-28a88.firebaseapp.com",
    projectId: "usen-28a88",
    storageBucket: "usen-28a88.firebasestorage.app",
    messagingSenderId: "1015677012887",
    appId: "1:1015677012887:web:719fa0962f92ac5309d2d2"
});

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentProfile = null;
let friendsUnsub = null;
let chatUnsub = null;
const pinStates = {};
let pinVisible = false;

// ── AUTH STATE ───────────────────────────────────────────
auth.onAuthStateChanged(async function(user) {
    if (user) {
        currentUser = user;
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists && doc.data().displayName) {
            currentProfile = doc.data();
            showPage('homePage');
            loadFriends();
        } else {
            const username = user.email.replace('@usen.app', '');
            document.getElementById('profileUsernameDisplay').textContent = '@' + username;
            showPage('setupPage');
        }
    } else {
        currentUser = null;
        currentProfile = null;
        showPage('loginPage');
    }
});

function showPage(id) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
}

// ── PIN MASKING ──────────────────────────────────────────
function handlePinInput(e, displayId, realId) {
    var display = document.getElementById(displayId);
    var real = document.getElementById(realId);
    var raw = display.value;
    var state = pinStates[displayId] || '';
    var newState = '';
    for (var i = 0; i < raw.length; i++) {
        newState += (raw[i] === '\u2022') ? (state[i] || '') : raw[i];
    }
    pinStates[displayId] = newState;
    real.value = newState;
    if (!pinVisible) display.value = '\u2022'.repeat(newState.length);
}

function handlePinKey(e, displayId, realId) {
    if (e.key === 'Backspace') {
        e.preventDefault();
        var display = document.getElementById(displayId);
        var real = document.getElementById(realId);
        pinStates[displayId] = (pinStates[displayId] || '').slice(0, -1);
        real.value = pinStates[displayId];
        display.value = pinVisible ? pinStates[displayId] : '\u2022'.repeat(pinStates[displayId].length);
    }
}

function togglePin(displayId, realId, btn) {
    pinVisible = !pinVisible;
    var display = document.getElementById(displayId);
    var state = pinStates[displayId] || '';
    display.value = pinVisible ? state : '\u2022'.repeat(state.length);
    btn.innerHTML = pinVisible ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
}

function toEmail(username) {
    return username.replace('@','').toLowerCase() + '@usen.app';
}

// ── REGISTER ─────────────────────────────────────────────
async function handleRegister() {
    var username = document.getElementById('loginUsername').value.trim().replace('@','');
    var pin = document.getElementById('loginPinReal').value.trim();
    if (!username || !pin) { showNotification('Enter username and PIN!'); return; }
    if (!/^[a-zA-Z0-9_]+$/.test(username)) { showNotification('Username: letters, numbers, _ only'); return; }
    if (pin.length < 6) { showNotification('PIN needs at least 6 characters'); return; }

    setBtn('registerBtn', true);
    var taken = await db.collection('usernames').doc(username.toLowerCase()).get();
    if (taken.exists) { showNotification('Username taken!'); setBtn('registerBtn', false); return; }

    try {
        var cred = await auth.createUserWithEmailAndPassword(toEmail(username), pin);
        await db.collection('usernames').doc(username.toLowerCase()).set({ uid: cred.user.uid });
        await db.collection('users').doc(cred.user.uid).set({
            username: username.toLowerCase(),
            displayName: '',
            bio: '',
            avatar: '',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    } catch(e) {
        showNotification(fbErr(e));
    }
    setBtn('registerBtn', false);
}

// ── LOGIN ─────────────────────────────────────────────────
async function handleLogin() {
    var username = document.getElementById('loginUsername').value.trim().replace('@','');
    var pin = document.getElementById('loginPinReal').value.trim();
    if (!username || !pin) { showNotification('Enter username and PIN!'); return; }
    setBtn('loginBtn', true);
    try {
        await auth.signInWithEmailAndPassword(toEmail(username), pin);
    } catch(e) {
        showNotification(fbErr(e));
        setBtn('loginBtn', false);
    }
}

// ── LOGOUT ───────────────────────────────────────────────
async function handleLogout() {
    if (friendsUnsub) friendsUnsub();
    if (chatUnsub) chatUnsub();
    closeModal('settingsModal');
    await auth.signOut();
    pinStates['loginPin'] = '';
    document.getElementById('loginPin').value = '';
    document.getElementById('loginPinReal').value = '';
}

// ── SETUP ─────────────────────────────────────────────────
var pendingAvatar = '';

function updateProfilePreview() {
    document.getElementById('profileNameDisplay').textContent = document.getElementById('setupDisplayName').value || 'Your Name';
}

function handleAvatarUpload() {
    var file = document.getElementById('avatarInput').files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('avatarImg').src = e.target.result;
        pendingAvatar = e.target.result;
    };
    reader.readAsDataURL(file);
}

async function completeSetup() {
    var displayName = document.getElementById('setupDisplayName').value.trim();
    var bio = document.getElementById('setupBio').value.trim();
    if (!displayName) { showNotification('Enter a display name!'); return; }
    setBtn('setupDoneBtn', true);
    try {
        await db.collection('users').doc(currentUser.uid).update({
            displayName: displayName, bio: bio, avatar: pendingAvatar || ''
        });
        currentProfile = { displayName: displayName, bio: bio, avatar: pendingAvatar || '',
            username: currentUser.email.replace('@usen.app','') };
        showPage('homePage');
        loadFriends();
        showNotification('Welcome, ' + displayName + '!');
    } catch(e) { showNotification(e.message); }
    setBtn('setupDoneBtn', false);
}

// ── FRIENDS / CHAT LIST ───────────────────────────────────
function loadFriends() {
    if (friendsUnsub) friendsUnsub();
    friendsUnsub = db.collection('users').doc(currentUser.uid)
        .collection('friends')
        .onSnapshot(function(snap) {
            renderChatList(snap.docs.map(function(d) { return d.data(); }));
        });
}

function renderChatList(friends) {
    var list = document.getElementById('chatList');
    list.innerHTML = '';
    if (friends.length === 0) {
        list.innerHTML = '<div style="padding:40px 20px;text-align:center;color:#666;font-size:18px;border-bottom:3px solid #fff;">No friends yet. Add them!</div>';
        return;
    }
    friends.forEach(function(f) {
        var item = document.createElement('div');
        item.className = 'chat-item';
        var av = f.avatar ? '<img src="' + f.avatar + '" />' : '👤';
        item.innerHTML = '<div class="chat-avatar">' + av + '</div><div class="chat-info"><div class="chat-name">' + f.displayName + '</div><div class="chat-preview">' + (f.lastMsg || 'No messages yet') + '</div></div>';
        item.onclick = function() { openChat(f); };
        list.appendChild(item);
    });
}

function filterChats() {
    var s = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#chatList .chat-item').forEach(function(item) {
        item.style.display = item.querySelector('.chat-name').textContent.toLowerCase().includes(s) ? '' : 'none';
    });
}

// ── ADD FRIEND ────────────────────────────────────────────
async function addFriend() {
    var username = document.getElementById('addFriendInput').value.trim().replace('@','').toLowerCase();
    if (!username) { showNotification('Enter a username!'); return; }
    if (username === (currentProfile.username || '')) { showNotification("That's you lol"); return; }

    var usernameDoc = await db.collection('usernames').doc(username).get();
    if (!usernameDoc.exists) { showNotification("User doesn't exist!"); return; }

    var theirUid = usernameDoc.data().uid;
    var existing = await db.collection('users').doc(currentUser.uid).collection('friends').doc(theirUid).get();
    if (existing.exists) { showNotification('Already added!'); return; }

    var theirDoc = await db.collection('users').doc(theirUid).get();
    var them = theirDoc.data();

    await db.collection('users').doc(currentUser.uid).collection('friends').doc(theirUid).set({
        uid: theirUid, username: them.username, displayName: them.displayName,
        avatar: them.avatar || '', lastMsg: ''
    });

    document.getElementById('addFriendInput').value = '';
    generateAccountsList();
    showNotification('@' + username + ' added!');
}

async function generateAccountsList() {
    var list = document.getElementById('accountsList');
    list.innerHTML = '<div style="color:#666;padding:10px;">Loading...</div>';
    var snap = await db.collection('users').doc(currentUser.uid).collection('friends').get();
    list.innerHTML = '';
    if (snap.empty) { list.innerHTML = '<div style="padding:40px;text-align:center;color:#666;">No friends yet!</div>'; return; }
    snap.forEach(function(doc) {
        var f = doc.data();
        var item = document.createElement('div');
        item.className = 'account-item';
        var av = f.avatar ? '<img src="' + f.avatar + '" style="width:100%;height:100%;object-fit:cover;" />' : '👤';
        item.innerHTML = '<div class="chat-avatar">' + av + '</div><div><div style="letter-spacing:-0.5px;">' + f.displayName + '</div><div style="color:#aaa;font-size:12px;">@' + f.username + '</div></div><button class="btn" style="padding:8px;font-size:13px;" onclick="removeFriend(\'' + doc.id + '\')">Remove</button>';
        list.appendChild(item);
    });
}

async function removeFriend(uid) {
    await db.collection('users').doc(currentUser.uid).collection('friends').doc(uid).delete();
    generateAccountsList();
    showNotification('Removed.');
}

// ── CHAT ──────────────────────────────────────────────────
function openChat(friend) {
    if (chatUnsub) chatUnsub();
    var chatId = [currentUser.uid, friend.uid].sort().join('_');

    var chatModal = document.getElementById('chatModal');
    if (!chatModal) {
        chatModal = document.createElement('div');
        chatModal.id = 'chatModal';
        chatModal.className = 'modal';
        document.body.appendChild(chatModal);
    }
    chatModal.innerHTML = '';
    chatModal.classList.add('active');

    var header = document.createElement('div');
    header.className = 'modal-header';
    header.innerHTML = '<span>' + friend.displayName + '</span>';
    var closeBtn = document.createElement('button');
    closeBtn.className = 'modal-close';
    closeBtn.textContent = 'X';
    closeBtn.onclick = function() { chatModal.classList.remove('active'); if (chatUnsub) chatUnsub(); };
    header.appendChild(closeBtn);
    chatModal.appendChild(header);

    var msgBox = document.createElement('div');
    msgBox.id = 'chatMsgs';
    msgBox.className = 'modal-content';
    msgBox.style.cssText = 'display:flex;flex-direction:column;padding:20px;';
    chatModal.appendChild(msgBox);

    var bar = document.createElement('div');
    bar.style.cssText = 'display:flex;border-top:3px solid #fff;flex-shrink:0;';
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.id = 'chatInput';
    inp.placeholder = 'Type something...';
    inp.style.cssText = "flex:1;background:#000;border:none;padding:15px;color:#fff;font-family:'Courier Prime',monospace;font-size:16px;outline:none;";
    inp.onkeydown = function(e) { if (e.key === 'Enter') sendMsg(chatId, friend); };
    var sendBtn = document.createElement('button');
    sendBtn.textContent = '\u27A4';
    sendBtn.style.cssText = "background:#fff;color:#000;border:none;border-left:3px solid #fff;padding:0 20px;font-family:'Courier Prime',monospace;font-size:18px;cursor:pointer;";
    sendBtn.onclick = function() { sendMsg(chatId, friend); };
    bar.appendChild(inp);
    bar.appendChild(sendBtn);
    chatModal.appendChild(bar);

    chatUnsub = db.collection('chats').doc(chatId).collection('messages')
        .orderBy('timestamp')
        .onSnapshot(function(snap) {
            msgBox.innerHTML = '';
            if (snap.empty) {
                var empty = document.createElement('div');
                empty.style.cssText = 'text-align:center;color:#666;padding:40px;';
                empty.textContent = 'No messages yet. Say something.';
                msgBox.appendChild(empty);
                return;
            }
            snap.forEach(function(doc) {
                var m = doc.data();
                var mine = m.fromUid === currentUser.uid;
                var wrap = document.createElement('div');
                wrap.style.cssText = 'display:flex;flex-direction:column;align-items:' + (mine ? 'flex-end' : 'flex-start') + ';margin-bottom:14px;';
                var bubble = document.createElement('div');
                bubble.style.cssText = 'max-width:75%;border:3px solid #fff;padding:10px 14px;background:' + (mine ? '#fff' : '#000') + ';color:' + (mine ? '#000' : '#fff') + ";font-family:'Courier Prime',monospace;font-size:15px;word-break:break-word;";
                bubble.textContent = m.text;
                var time = document.createElement('div');
                time.style.cssText = 'font-size:11px;color:#666;margin-top:4px;';
                time.textContent = m.timestamp ? new Date(m.timestamp.toDate()).toLocaleTimeString() : '';
                wrap.appendChild(bubble);
                wrap.appendChild(time);
                msgBox.appendChild(wrap);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });

    setTimeout(function() { inp.focus(); }, 100);
}

async function sendMsg(chatId, friend) {
    var inp = document.getElementById('chatInput');
    if (!inp) return;
    var text = inp.value.trim();
    if (!text) return;
    inp.value = '';
    await db.collection('chats').doc(chatId).collection('messages').add({
        text: text, fromUid: currentUser.uid,
        fromName: currentProfile.displayName,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    var preview = { lastMsg: text };
    db.collection('users').doc(currentUser.uid).collection('friends').doc(friend.uid).update(preview);
    db.collection('users').doc(friend.uid).collection('friends').doc(currentUser.uid).update(preview).catch(function(){});
}

// ── FEED ──────────────────────────────────────────────────
async function openSocialFeed() {
    document.getElementById('feedModal').classList.add('active');
    var feedContent = document.getElementById('feedContent');
    feedContent.innerHTML = '<div style="color:#666;padding:20px;text-align:center;">Loading...</div>';
    var snap = await db.collection('posts').orderBy('timestamp','desc').limit(30).get();
    feedContent.innerHTML = '';
    if (snap.empty) { feedContent.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">No posts yet!</div>'; return; }
    snap.forEach(function(doc) {
        var p = doc.data();
        var item = document.createElement('div');
        item.className = 'feed-item';
        item.innerHTML = '<div class="feed-user">' + p.displayName + '</div><div style="font-size:12px;color:#666;margin-bottom:8px;">@' + p.username + '</div><div class="feed-content">' + p.text + '</div>';
        feedContent.appendChild(item);
    });
}

async function uploadPost() {
    var text = document.getElementById('postText').value.trim();
    if (!text) { showNotification('Write something first!'); return; }
    setBtn('postBtn', true);
    await db.collection('posts').add({
        text: text, displayName: currentProfile.displayName,
        username: currentProfile.username, uid: currentUser.uid,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    document.getElementById('postText').value = '';
    setBtn('postBtn', false);
    closeModal('socialModal');
    showNotification('Posted!');
}

// ── SETTINGS ─────────────────────────────────────────────
function openSettings() {
    document.getElementById('settingsDisplayName').value = currentProfile.displayName || '';
    document.getElementById('settingsModal').classList.add('active');
}

async function updateDisplayName() {
    var name = document.getElementById('settingsDisplayName').value.trim();
    if (!name) return;
    await db.collection('users').doc(currentUser.uid).update({ displayName: name });
    currentProfile.displayName = name;
    showNotification('Name updated!');
}

function handleSettingsAvatar() {
    var file = document.getElementById('settingsAvatarInput').files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = async function(e) {
        var avatar = e.target.result;
        await db.collection('users').doc(currentUser.uid).update({ avatar: avatar });
        currentProfile.avatar = avatar;
        showNotification('Avatar updated!');
    };
    reader.readAsDataURL(file);
}

// ── HELPERS ───────────────────────────────────────────────
function openMenuModal() { document.getElementById('menuModal').classList.add('active'); }
function closeMenuModal() { document.getElementById('menuModal').classList.remove('active'); }
function openAccountsModal() { closeMenuModal(); generateAccountsList(); document.getElementById('accountsModal').classList.add('active'); }
function openSocialModal() { closeMenuModal(); document.getElementById('socialModal').classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); closeMenuModal(); }

function setBtn(id, disabled) { var b = document.getElementById(id); if (b) b.disabled = disabled; }

function fbErr(e) {
    var map = {
        'auth/email-already-in-use':'Username already taken!',
        'auth/user-not-found':'Account not found!',
        'auth/wrong-password':'Wrong PIN!',
        'auth/invalid-credential':'Wrong username or PIN!',
        'auth/too-many-requests':'Too many attempts. Try later.',
        'auth/weak-password':'PIN too short (min 6 chars)'
    };
    return map[e.code] || e.message;
}

function showNotification(text) {
    var old = document.querySelector('.usen-notif');
    if (old) old.remove();
    var n = document.createElement('div');
    n.className = 'usen-notif';
    n.style.cssText = "position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:15px 30px;border:3px solid #000;z-index:99999;font-family:'Courier Prime',monospace;font-size:16px;letter-spacing:-0.5px;white-space:nowrap;";
    n.textContent = text;
    document.body.appendChild(n);
    setTimeout(function() { n.remove(); }, 2500);
}

function addFallingDots() {
    setInterval(function() {
        if (Math.random() > 0.6) {
            var dot = document.createElement('div');
            dot.className = 'falling-dot';
            var size = [2,3,4,5,6][Math.floor(Math.random()*5)];
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = Math.random()*100 + '%';
            dot.style.animationDuration = (3 + Math.random()*4) + 's';
            document.body.appendChild(dot);
            setTimeout(function() { dot.remove(); }, 7000);
        }
    }, 300);
}

document.addEventListener('click', function(e) {
    if (!e.target.closest('.bottom-nav') && !e.target.closest('.menu-modal')) closeMenuModal();
});

addFallingDots();
</script>
